name: Record from Stream Start – Per‑Segment Commit (10min)

on:
  workflow_dispatch:
    inputs:
      channel_name:
        description: 'Twitch channel name (e.g., "agurin")'
        required: true
      segments:
        description: 'Number of 10-minute segments from start (0 = until end of stream)'
        default: '6'

jobs:
  record-segments:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create folder
        id: folder
        run: |
          TS=$(date +'%m%d%H%M%S')
          echo "name=$TS" >> $GITHUB_OUTPUT
          mkdir -p "$TS"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download 10‑min segments from stream start
        run: |
          cd "${{ steps.folder.outputs.name }}"
          segment=1
          while true; do
            start=$(( (segment-1) * 600 ))   # start time in seconds
            end=$(( start + 600 ))           # end time in seconds
            # Format as HH:MM:SS for yt-dlp
            start_fmt=$(printf "%02d:%02d:%02d" $((start/3600)) $(( (start%3600)/60 )) $((start%60)))
            end_fmt=$(printf "%02d:%02d:%02d" $((end/3600)) $(( (end%3600)/60 )) $((end%60)))
            echo "=== Segment $segment: $start_fmt to $end_fmt ==="

            # Download the exact section
            yt-dlp \
              --live-from-start \
              --download-sections "*${start_fmt}-${end_fmt}" \
              --force-keyframes-at-cuts \
              --format "bestvideo[height<=480]+bestaudio/best[height<=480]" \
              --merge-output-format mp4 \
              --output "segment_$(printf '%03d' $segment).mp4" \
              --no-overwrites \
              --retries 5 \
              --twitch-disable-ads \
              "https://twitch.tv/${{ github.event.inputs.channel_name }}"

            # If the segment file is empty or doesn't exist, stop (stream ended)
            if [ ! -s "segment_$(printf '%03d' $segment).mp4" ]; then
              echo "Stream ended or no more data, stopping."
              rm -f "segment_$(printf '%03d' $segment).mp4"
              break
            fi

            # Commit and push this segment
            git add "segment_$(printf '%03d' $segment).mp4"
            git commit -m "Segment $segment (${start_fmt} to ${end_fmt}) from ${{ github.event.inputs.channel_name }}"
            git push

            segment=$((segment + 1))
            # Stop if we've reached the requested number of segments
            if [ "${{ github.event.inputs.segments }}" -ne 0 ] && [ $segment -gt ${{ github.event.inputs.segments }} ]; then
              break
            fi
          done
