name: Download M3U8 in Chunks and Commit Each

on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: 'Direct URL to the .m3u8 playlist'
        required: true
      start_time:
        description: 'Start time (e.g., "30:00" or "1:20:30")'
        required: true
        default: '0:00'
      end_time:
        description: 'End time (e.g., "1:20:00"). Leave empty to download until VOD ends.'
        required: false
        default: ''
      chunk_minutes:
        description: 'Minutes per chunk (e.g., 2)'
        required: true
        default: '2'
      output_prefix:
        description: 'Prefix for output files (e.g., "part") -> part_001.mp4, part_002.mp4, ...'
        required: false
        default: 'chunk'

jobs:
  download-chunks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Convert times to seconds for looping
        id: convert
        run: |
          # Convert start_time (HH:MM:SS or MM:SS) to seconds
          START_RAW="${{ github.event.inputs.start_time }}"
          START_SEC=$(echo "$START_RAW" | awk -F: '{ total=0; for(i=1;i<=NF;i++) total = total*60 + $i; print total }')
          echo "start_sec=$START_SEC" >> $GITHUB_OUTPUT

          # Convert end_time if provided, otherwise set to 0 (meaning "no end limit")
          END_RAW="${{ github.event.inputs.end_time }}"
          if [ -n "$END_RAW" ]; then
            END_SEC=$(echo "$END_RAW" | awk -F: '{ total=0; for(i=1;i<=NF;i++) total = total*60 + $i; print total }')
            echo "end_sec=$END_SEC" >> $GITHUB_OUTPUT
            echo "has_end=true" >> $GITHUB_OUTPUT
          else
            echo "has_end=false" >> $GITHUB_OUTPUT
          fi

      - name: Download and commit chunks
        run: |
          M3U8_URL="${{ github.event.inputs.m3u8_url }}"
          CHUNK_MIN=${{ github.event.inputs.chunk_minutes }}
          CHUNK_SEC=$((CHUNK_MIN * 60))
          PREFIX="${{ github.event.inputs.output_prefix }}"
          START_SEC=${{ steps.convert.outputs.start_sec }}
          HAS_END=${{ steps.convert.outputs.has_end }}
          if [ "$HAS_END" = "true" ]; then
            END_SEC=${{ steps.convert.outputs.end_sec }}
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          chunk_index=1
          current_start=$START_SEC

          while true; do
            # Determine end of this chunk
            current_end=$((current_start + CHUNK_SEC))
            # If we have a hard end time and this chunk would overshoot, trim it
            if [ "$HAS_END" = "true" ] && [ $current_end -gt $END_SEC ]; then
              current_end=$END_SEC
            fi

            # Convert current_start and current_end to HH:MM:SS
            start_fmt=$(printf "%02d:%02d:%02d" $((current_start/3600)) $(((current_start%3600)/60)) $((current_start%60)))
            end_fmt=$(printf "%02d:%02d:%02d" $((current_end/3600)) $(((current_end%3600)/60)) $((current_end%60)))

            echo "=== Chunk $chunk_index: $start_fmt to $end_fmt ==="
            OUT_FILE="${PREFIX}_$(printf '%03d' $chunk_index).mp4"

            # Download this time section
            yt-dlp \
              --download-sections "*${start_fmt}-${end_fmt}" \
              --force-keyframes-at-cuts \
              --merge-output-format mp4 \
              --output "$OUT_FILE" \
              --no-overwrites \
              --retries 5 \
              "$M3U8_URL"

            # Check if file was created and has size > 0
            if [ ! -s "$OUT_FILE" ]; then
              echo "Chunk $chunk_index produced empty file. Stopping."
              rm -f "$OUT_FILE" 2>/dev/null
              break
            fi

            # Commit this chunk immediately
            git add "$OUT_FILE"
            git commit -m "Chunk $chunk_index: $start_fmt to $end_fmt"
            git push

            # Prepare next chunk start
            current_start=$current_end

            # Stop conditions:
            # 1. If we have an end time and current_start >= end_sec, we're done
            if [ "$HAS_END" = "true" ] && [ $current_start -ge $END_SEC ]; then
              echo "Reached specified end time. Done."
              break
            fi
            # 2. If no end time, we continue until yt-dlp gives an empty file.
            #    But we also need to stop if we reached the true end of VOD.
            #    The empty file detection above will break the loop.
            #    To avoid infinite loops in case of errors, we also break if current_start hasn't advanced.
            if [ $current_start -eq $((current_start - CHUNK_SEC)) ]; then
              echo "No progress, stopping."
              break
            fi

            chunk_index=$((chunk_index + 1))
          done

          echo "Finished. Total chunks downloaded: $chunk_index"
